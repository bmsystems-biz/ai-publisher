baseURL = "https://invest-lab.bmsystems.biz/"
locale = "ko-KR"
title = "InvestLab"
theme = "PaperMod"
defaultContentLanguage = "ko"
enableRobotsTXT = true
buildDrafts = false
buildFuture = true

[pagination]
  pagerSize = 10

[params]
  env = "production"
  title = "InvestLab"
  description = "투자 재테크 정보 블로그"
  author = "InvestLab"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = false
  comments = false

  [params.homeInfoParams]
    Title = "InvestLab"
    Content = "최신 투자 재테크 정보와 시장 트렌드"

  [params.socialIcons]

[menu]
  [[menu.main]]
    identifier = "home"
    name = "홈"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "posts"
    name = "전체 아티클"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    identifier = "cat-주식"
    name = "주식"
    url = "/categories/주식/"
    weight = 10
  [[menu.main]]
    identifier = "cat-부동산"
    name = "부동산"
    url = "/categories/부동산/"
    weight = 11
  [[menu.main]]
    identifier = "cat-세금"
    name = "세금"
    url = "/categories/세금/"
    weight = 12
  [[menu.main]]
    identifier = "cat-연금"
    name = "연금"
    url = "/categories/연금/"
    weight = 13
  [[menu.main]]
    identifier = "cat-노후대비"
    name = "노후대비"
    url = "/categories/노후대비/"
    weight = 14

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"
